name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # dummy values so build/prisma generate never touch a real service
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/db"
      AUTH_SECRET: "ci-secret"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Use `npm install` (not `npm ci`): the lockfile is generated on Windows and omits the
      # transitive deps of the wasm fallback (@tailwindcss/oxide-wasm32-wasi → @emnapi/*), which
      # Linux's strict `npm ci` rejects. `npm install` respects locked versions and heals the gap.
      - run: npm install --no-audit --no-fund
      - name: Prisma generate
        run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npx next build
